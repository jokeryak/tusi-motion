<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Tusi Motion</title>

    <style>
      body {
        margin: 0;
        background: #111;
        color: white;
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .controls {
        margin-top: 20px;
      }

      .controls input {
        width: 80px;
        margin-right: 10px;
      }

      canvas {
        background: black;
        margin-top: 10px;
      }
    </style>
  </head>

  <body>
    <div class="controls">
      Speed:
      <input type="number" id="speed" step="0.005" value="0.02" />

      Trail:
      <input type="number" id="trailAmount" value="300" />

      Balls:
      <input type="number" id="ballCount" value="1" />
    </div>

    <canvas id="canvas" width="600" height="600"></canvas>

    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      const speedInput = document.getElementById("speed");
      const trailInput = document.getElementById("trailAmount");
      const ballInput = document.getElementById("ballCount");

      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;

      const R = 150;
      const r = R / 2;

      let t = 0;

      let trails = [];

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        let speed = parseFloat(speedInput.value) || 0.02;
        let trailLimit = parseInt(trailInput.value) || 300;
        let ballCount = parseInt(ballInput.value) || 1;

        if (trails.length !== ballCount) {
          trails = [];
          for (let i = 0; i < ballCount; i++) {
            trails.push([]);
          }
        }

        // Big circle
        ctx.beginPath();
        ctx.arc(centerX, centerY, R, 0, Math.PI * 2);
        ctx.strokeStyle = "white";
        ctx.stroke();

        // Small circle center
        let cx = centerX + (R - r) * Math.cos(t);
        let cy = centerY + (R - r) * Math.sin(t);

        // Small circle
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.strokeStyle = "cyan";
        ctx.stroke();

        for (let i = 0; i < ballCount; i++) {
          let offset = ((Math.PI * 2) / ballCount) * i;

          let px = cx + r * Math.cos(-t + offset);
          let py = cy + r * Math.sin(-t + offset);

          trails[i].push({ x: px, y: py });

          if (trails[i].length > trailLimit) {
            trails[i].shift();
          }

          // draw trail
          ctx.beginPath();

          for (let j = 0; j < trails[i].length; j++) {
            if (j === 0) {
              ctx.moveTo(trails[i][j].x, trails[i][j].y);
            } else {
              ctx.lineTo(trails[i][j].x, trails[i][j].y);
            }
          }

          ctx.strokeStyle = "yellow";
          ctx.lineWidth = 2;
          ctx.stroke();

          // draw ball
          ctx.beginPath();
          ctx.arc(px, py, 6, 0, Math.PI * 2);
          ctx.fillStyle = "red";
          ctx.fill();
        }

        t += speed;

        requestAnimationFrame(draw);
      }

      draw();
    </script>
  </body>
</html>
